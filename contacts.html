<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contact</title>

  <link rel="stylesheet" href="styles.css">
  <link rel="shortcut icon" href="/pics/Logo-2.png">
</head>

<body>

<!-- NAVBAR -->
<nav class="top-nav">
  <ul class="nav-list"> 
    <li><a href="index.html">Home</a></li>
    <li><a href="about.html">About Me</a></li>
    <li><a href="curriculum.html">Curriculum</a></li>
    <li><a href="contacts.html">Contact Me</a></li>
  </ul>
</nav>

<main>

<!-- CONTACT SECTION -->
<section class="content-block animate-fade">
  <h1 class="main-title">Contact Me</h1>

  <form class="contact-form" action="https://form-to-email.steam-center.workers.dev/" method="post">

    <input type="hidden" name="send-to" value="jramirez@brooklynsteamcenter.org">

    <input class="form-input" type="text" name="first_name" placeholder="First Name" required>
    <input class="form-input" type="text" name="last_name" placeholder="Last Name" required>
    <input class="form-input" type="email" name="email" placeholder="Email" required>

    <input type="submit" class="primary-btn" value="Send">
  </form>

</section>

</main>

<!-- FOOTER -->
<footer class="site-footer">
  <p>&copy; 2026 Jayson Ramirez Marin</p>
</footer>

<!-- ANIMATION SCRIPT -->
<script>
const fadeItems = document.querySelectorAll(".animate-fade");

const scrollObserver = new IntersectionObserver(entries => {
  entries.forEach(entry => {
    if (entry.isIntersecting) {
      entry.target.classList.add("visible");
    }
  });
});

fadeItems.forEach(item => scrollObserver.observe(item));
</script>

</body>
</html>
