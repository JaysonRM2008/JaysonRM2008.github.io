<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contact</title>

  <link rel="stylesheet" href="styles.css">
  <link rel="shortcut icon" href="/pics/Logo-2.png">
</head>

<body>

<nav class="navbar">
  <ul> 
    <li><a href="index.html">Home</a></li>
    <li><a href="about.html">About Me</a></li>
    <li><a href="curriculum.html">Curriculum</a></li>
    <li><a href="contacts.html">Contact Me</a></li>
  </ul>
</nav>

<main>

<section class="section fade-in">
  <h1 class="JRM">Contact Me</h1>

  <form action="https://form-to-email.steam-center.workers.dev/" method="post">

    <input type="hidden" name="send-to" value="jramirez@brooklynsteamcenter.org">

    <input type="text" name="first_name" placeholder="First Name" required>
    <input type="text" name="last_name" placeholder="Last Name" required>
    <input type="email" name="email" placeholder="Email" required>

    <input type="submit" class="btn" value="Send">
  </form>

</section>

</main>

<footer>
  <p>&copy; 2026 Jayson Ramirez Marin</p>
</footer>

<script>
const elements = document.querySelectorAll(".fade-in");
const observer = new IntersectionObserver(entries => {
  entries.forEach(entry => {
    if (entry.isIntersecting) {
      entry.target.classList.add("show");
    }
  });
});
elements.forEach(el => observer.observe(el));
</script>

</body>
</html>
