<!-- HEADER -->
<main>

  <h1 class="JRM">Contact Me</h1>

  <p class="light" style="text-align:center;">
    Contact me through this form or social links below 💬
  </p>

  <!-- FORM -->
  <form action="https://form-to-email.steam-center.workers.dev/" method="post">

    <input type="hidden" name="send-to" value="jramirez@brooklynsteamcenter.org">

    <label>First Name</label>
    <input type="text" name="first_name" required>

    <label>Last Name</label>
    <input type="text" name="last_name" required>

    <label>Email</label>
    <input type="email" name="email" required>

    <label>Phone Number</label>
    <input type="tel" name="phone" required>

    <label>Reason for reaching out</label>
    <input type="text" name="reaching_out" required>

    <label>Occupation</label>
    <input type="text" name="job" required>

    <label>Gender</label>

    <div>
      <input type="radio" name="gender" value="male"> Male
      <input type="radio" name="gender" value="female"> Female
      <input type="radio" name="gender" value="non_binary"> Non-binary
    </div>

    <input type="text" name="gender_other" placeholder="Other">

    <br><br>

    <input type="submit" class="btn">
    <input type="reset" class="btn">

  </form>

  <!-- SOCIAL LINKS -->
  <div class="icon" style="text-align:center; margin-top:30px;">

    <a href="mailto:jramirez@brooklynsteamcenter.org">
      <i data-lucide="mail"></i>
    </a>

    <a href="https://github.com/JaysonRM2008" target="_blank">

    </a>

    </a>

    <a href="https://www.facebook.com/profile.php?id=100085109656048" target="_blank">
      <i data-lucide="facebook"></i>
    </a>

    <a href="https://linktr.ee/Jayson_Ramirez" target="_blank">
      <i data-lucide="link-2"></i>
    </a>

  </div>
